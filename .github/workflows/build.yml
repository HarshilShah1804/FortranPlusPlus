name: Build Parser

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex yacc
          
      - name: Build lexer
        run: |
          chmod +x ./compile.sh
          ./compile.sh
