name: Build Parser

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison libfl-dev python3

      - name: Build lexer and parser
        run: |
          chmod +x ./compile.sh
          ./compile.sh

      - name: Generate parsing table
        run: |
          python3 create_parsing_table.py

      - name: Upload parsing table artifact
        uses: actions/upload-artifact@v4
        with:
          name: parsing-table
          path: parser/parsing_table.csv